name: Setup
description: Check out repo, set up Node.js, and install dependencies

runs:
  using: composite
  steps:
    - name: Check out Git repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        cache: npm
        cache-dependency-path: ./package.json

    - name: Install dependencies
      run: npm install
      shell: bash
