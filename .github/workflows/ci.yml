name: 🚦 CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: 🔬 Oxlint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - name: Oxlint
        run: npm run lint

  prettier:
    name: 💅 Oxfmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - name: Oxfmt
        run: npm run fmt

  typecheck:
    name: 👾 TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - name: TypeScript
        run: npm run typecheck

